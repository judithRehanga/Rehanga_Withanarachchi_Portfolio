<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Calculator | Rehanga Portfolio</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="calculator">
      <h1>Calculator</h1>

      <div class="display">
        <input type="text" id="display" placeholder="0" readonly />
      </div>

      <div class="buttons">
        <button>AC</button>
        <button>⌫</button>
        <button>%</button>
        <button>÷</button>

        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="operator">×</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="operator">−</button>

        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="operator">+</button>

        <button class="zero">0</button>
        <button>.</button>
        <button class="equals">=</button>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
